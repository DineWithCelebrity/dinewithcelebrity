<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Join Free — Dine With Celebrity</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
:root{--black:#06040A;--gold:#F2B705;--gold2:#FFD166;--red:#D4002A;--green:#00C853;--white:rgba(255,255,255,.92);--sub:rgba(255,255,255,.75);--muted:rgba(255,255,255,.5);--border:rgba(242,183,5,.2);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:Poppins,sans-serif;min-height:100vh;overflow-x:hidden;}
.stars-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;color:var(--gold);opacity:0;animation:twinkle var(--dur,3s) var(--delay,0s) infinite;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:var(--op,.3);transform:scale(1)}}
.celeb-bg{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.celeb{position:absolute;bottom:0;opacity:0;animation:celebRise var(--cd,8s) var(--cdelay,0s) ease-in-out infinite alternate;}
.celeb svg{width:100%;height:auto;filter:drop-shadow(0 0 28px rgba(242,183,5,.2));}
@keyframes celebRise{0%{opacity:0;transform:translateY(40px) scale(.95)}35%{opacity:var(--cop,.08)}65%{opacity:var(--cop,.08)}100%{opacity:0;transform:translateY(-10px) scale(1.02)}}
.app{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
.logo-bar{font-family:"Bebas Neue",sans-serif;font-size:1rem;color:var(--gold);letter-spacing:4px;margin-bottom:2rem;opacity:.7;text-align:center;}
.card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:440px;backdrop-filter:blur(12px);}
.card-title{font-family:"Bebas Neue",sans-serif;font-size:2.4rem;color:var(--white);letter-spacing:1px;text-align:center;margin-bottom:.3rem;}
.card-title em{color:var(--gold);font-style:normal;}
.card-sub{color:var(--sub);font-size:.88rem;text-align:center;margin-bottom:2rem;line-height:1.6;}
.field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.1rem;}
.field label{font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);}
.field input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.85rem 1rem;color:var(--white);font-family:Poppins,sans-serif;font-size:.95rem;outline:none;transition:border .2s;}
.field input:focus{border-color:var(--gold);}
.field input::placeholder{color:var(--muted);}
.field input.error{border-color:var(--red);}
.error-msg{color:var(--red);font-size:.8rem;margin-top:.3rem;display:none;}
.phone-row{display:flex;gap:.6rem;}
.phone-prefix{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.85rem .9rem;color:var(--sub);font-family:Poppins,sans-serif;font-size:.95rem;white-space:nowrap;min-width:62px;display:flex;align-items:center;justify-content:center;}
.terms{font-size:.75rem;color:var(--muted);text-align:center;margin-bottom:1.5rem;line-height:1.6;}
.terms a{color:rgba(242,183,5,.7);text-decoration:none;}
.terms a:hover{color:var(--gold);}
.btn-join{width:100%;background:var(--gold);color:#06040A;border:none;border-radius:10px;padding:1rem;font-family:Poppins,sans-serif;font-weight:700;font-size:1.05rem;cursor:pointer;letter-spacing:.5px;transition:opacity .2s;position:relative;}
.btn-join:hover{opacity:.88;}
.btn-join:disabled{opacity:.5;cursor:default;}
.btn-join .spinner{display:none;width:18px;height:18px;border:2px solid rgba(6,4,10,.3);border-top-color:#06040A;border-radius:50%;animation:spin .7s linear infinite;position:absolute;right:1.2rem;top:50%;transform:translateY(-50%);}
@keyframes spin{to{transform:translateY(-50%) rotate(360deg)}}
.btn-join.loading .spinner{display:block;}
.divider{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;color:var(--muted);font-size:.78rem;}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.08);}
.signin-row{text-align:center;font-size:.85rem;color:var(--sub);}
.signin-row a{color:var(--gold);text-decoration:none;font-weight:600;}
.signin-row a:hover{text-decoration:underline;}
.success-card{display:none;text-align:center;}
.success-icon{font-size:3rem;margin-bottom:1rem;}
.success-title{font-family:"Bebas Neue",sans-serif;font-size:2rem;color:var(--gold);margin-bottom:.5rem;}
.success-sub{color:var(--sub);font-size:.9rem;line-height:1.7;}
.free-pill{display:inline-flex;align-items:center;gap:.4rem;background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.25);border-radius:20px;padding:.3rem .9rem;font-size:.78rem;color:var(--green);margin-bottom:1.5rem;}
.ref-field{margin-bottom:.6rem;}
.ref-optional{font-size:.72rem;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;}
.global-err{background:rgba(212,0,42,.1);border:1px solid rgba(212,0,42,.3);border-radius:8px;padding:.75rem 1rem;color:#ff6b6b;font-size:.83rem;margin-bottom:1rem;display:none;}
</style></head><body>
<div class="stars-bg" id="starsBg"></div>
<div class="celeb-bg" id="celebBg"></div>
<div class="app">
  <div class="logo-bar">&#10022; DINE WITH CELEBRITY &#10022;</div>
  <div class="card" id="mainCard">
    <div class="free-pill">&#9733; Free Forever &mdash; No Credit Card</div>
    <div class="card-title">Join <em>Free.</em></div>
    <p class="card-sub">Create your account in 30 seconds. Start earning your celebrity dinner seat today.</p>
    <div class="global-err" id="globalErr"></div>
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="inp-name" placeholder="Your full name" autocomplete="name"/>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="inp-email" placeholder="you@email.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Mobile Number</label>
      <div class="phone-row">
        <div class="phone-prefix">+91</div>
        <input type="tel" id="inp-phone" placeholder="98765 43210" autocomplete="tel" style="flex:1"/>
      </div>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="inp-pass" placeholder="Min 6 characters" autocomplete="new-password"/>
    </div>
    <div class="field ref-field">
      <label>Referral Code <span class="ref-optional">(Optional)</span></label>
      <input type="text" id="inp-ref" placeholder="e.g. DWC-RUPESH1234" autocomplete="off" style="text-transform:uppercase"/>
    </div>
    <p class="terms">By joining you agree to our <a href="/disclaimer.html">Terms</a> and <a href="/disclaimer.html">Privacy Policy</a>. DWC is free forever.</p>
    <button class="btn-join" id="btn-join">
      &#9733;&nbsp; Create Free Account
      <span class="spinner"></span>
    </button>
    <div class="divider">or</div>
    <div class="signin-row">Already a member? <a href="/signin.html">Sign In</a></div>
  </div>
  
</div>
<script>
var SUPABASE_URL='https://blwqqqzhnovsveeryjlm.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsd3FxcXpobm92c3ZlZXJ5amxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzQ4OTksImV4cCI6MjA4OTQxMDg5OX0.jqQb0IEByZLxHIFAAflMdh_rWYjllVzsexfNRRM7yeY';
var sbClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function initStars(){
  var bg=document.getElementById('starsBg');
  for(var i=0;i<55;i++){
    var s=document.createElement('span');
    s.className='star';
    s.textContent='★';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    s.style.setProperty('--dur',(2+Math.random()*4)+'s');
    s.style.setProperty('--delay',Math.random()*5+'s');
    s.style.setProperty('--op',(0.1+Math.random()*0.3)+'');
    s.style.fontSize=(7+Math.random()*9)+'px';
    bg.appendChild(s);
  }
}

function initCelebs(){
  var bg=document.getElementById('celebBg');
  var svgStr='<svg viewBox="0 0 100 220" xmlns="http://www.w3.org/2000/svg"><ellipse cx="50" cy="30" rx="22" ry="26" fill="#F2B705"/><path d="M12 220 Q12 130 30 108 Q40 95 50 93 Q60 95 70 108 Q88 130 88 220Z" fill="#F2B705"/><line x1="30" y1="112" x2="8" y2="170" stroke="#F2B705" stroke-width="15" stroke-linecap="round"/><line x1="70" y1="112" x2="92" y2="170" stroke="#F2B705" stroke-width="15" stroke-linecap="round"/><' + '/svg>';
  [{l:'2%',d:'0s',dur:'9s',op:'0.08',w:'130px'},{l:'14%',d:'2s',dur:'11s',op:'0.07',w:'155px'},{l:'72%',d:'0.5s',dur:'12s',op:'0.07',w:'140px'},{l:'88%',d:'1.5s',dur:'10s',op:'0.08',w:'125px'}].forEach(function(p){
    var div=document.createElement('div');
    div.className='celeb';
    div.style.left=p.l;
    div.style.width=p.w;
    div.style.setProperty('--cd',p.dur);
    div.style.setProperty('--cdelay',p.d);
    div.style.setProperty('--cop',p.op);
    div.innerHTML=svgStr;
    bg.appendChild(div);
  });
}

function genReferralCode(name){
  var clean=name.replace(/[^a-zA-Z]/g,'').toUpperCase().substring(0,6);
  var num=Math.floor(1000+Math.random()*9000);
  return 'DWC-'+clean+num;
}

function showError(msg){
  var el=document.getElementById('globalErr');
  el.textContent=msg;
  el.style.display='block';
}

function hideError(){
  document.getElementById('globalErr').style.display='none';
}

async function doSignup(){
  hideError();
  var name=document.getElementById('inp-name').value.trim();
  var email=document.getElementById('inp-email').value.trim();
  var phone=document.getElementById('inp-phone').value.trim();
  var pass=document.getElementById('inp-pass').value;
  var btn=document.getElementById('btn-join');

  if(!name){showError('Please enter your full name.');return;}
  if(!email||!email.includes('@')){showError('Please enter a valid email address.');return;}
  if(!phone||phone.length<10){showError('Please enter a valid 10-digit mobile number.');return;}
  if(!pass||pass.length<6){showError('Password must be at least 6 characters.');return;}

  btn.disabled=true;
  btn.classList.add('loading');

  var referralCode=genReferralCode(name);
  var referred_by=document.getElementById('inp-ref').value.trim().toUpperCase()||'';

  var res=await sbClient.auth.signUp({
    email:email,
    password:pass,
    options:{
      data:{full_name:name,phone:'+91'+phone.replace(/s/g,'')},
      emailRedirectTo:'https://www.dinewithcelebrity.com/onboarding.html'
    }
  });

  if(res.error){
    showError(res.error.message);
    btn.disabled=false;
    btn.classList.remove('loading');
    return;
  }

  if(res.data&&res.data.user){
    try{
      await sbClient.from('members').upsert({
        id:res.data.user.id,
        full_name:name,
        email:email,
        phone:'+91'+phone.replace(/s/g,''),
        tier:'free',
        points:300,
        referral_code:referralCode,
        referred_by:referred_by
      },{onConflict:'id'});
      if(referred_by){
        var refRes=await sbClient.from('members').select('id,points').eq('referral_code',referred_by).single();
        if(refRes.data){
          await sbClient.from('members').update({points:(refRes.data.points||0)+500}).eq('id',refRes.data.id);
        }
      }
    }catch(e){console.error(e);}
  }

  btn.classList.remove('loading');
  window.location.href='/onboarding.html';
}

document.addEventListener('DOMContentLoaded',function(){
  initStars();
  initCelebs();
  document.getElementById('btn-join').addEventListener('click',doSignup);
  // Auto-fill referral code from URL
  try{
    var urlRef=new URLSearchParams(window.location.search).get('ref');
    if(urlRef){
      var refInput=document.getElementById('inp-ref');
      refInput.value=urlRef.toUpperCase();
      refInput.closest('.ref-field').style.background='rgba(242,183,5,0.05)';
      refInput.closest('.ref-field').style.border='1px solid rgba(242,183,5,0.2)';
      refInput.closest('.ref-field').style.borderRadius='10px';
      refInput.closest('.ref-field').style.padding='.5rem .75rem';
    }
  }catch(e){}
  document.getElementById('inp-pass').addEventListener('keydown',function(e){ if(e.key==='Enter') doSignup(); });
  sbClient.auth.getSession().then(function(res){
    if(res.data&&res.data.session){ window.location.href='/onboarding.html'; }
  });
});
</script></body></html>
