<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Join Free — Dine With Celebrity | India's Celebrity Dining Club</title>
<meta name="description" content="Sign up free to Dine With Celebrity. Earn points on every experience and redeem toward a real celebrity dinner. 153 cities across India."/>
<meta name="keywords" content="dine with celebrity signup, celebrity dining membership India, DWC join free"/>
<meta property="og:title" content="Join Dine With Celebrity — Free Membership"/>
<meta property="og:description" content="Sign up free. Earn points. Dine with your favourite celebrity."/>
<meta property="og:image" content="https://www.dinewithcelebrity.com/logo.png"/>
<meta property="og:url" content="https://www.dinewithcelebrity.com/signup"/>
<meta property="og:type" content="website"/>
<meta name="twitter:card" content="summary_large_image"/>
<link rel="canonical" href="https://www.dinewithcelebrity.com/signup"/>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebPage","name":"Join Dine With Celebrity","url":"https://www.dinewithcelebrity.com/signup","publisher":{"@type":"Organization","name":"Dine With Celebrity Pvt Ltd","logo":{"@type":"ImageObject","url":"https://www.dinewithcelebrity.com/logo.png"}}}</script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#06040A;--gold:#F2B705;--gold2:#FFD166;--red:#D4002A;--green:#00C853;--text:rgba(255,255,255,.95);--sub:rgba(255,255,255,.72);--muted:rgba(255,255,255,.45);--border:rgba(242,183,5,.2);--border2:rgba(255,255,255,.08);--card:#0f0d14;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;}
/* ── STARS ── */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
#stars i{position:absolute;color:#F2B705;font-style:normal;animation:tw 3s ease-in-out infinite alternate}
@keyframes tw{0%{opacity:.04}100%{opacity:.2}}
/* ── LAYOUT ── */
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
.logo-bar{margin-bottom:2rem;text-align:center}
.logo-bar img{height:48px;width:auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px}
.card-title{font-family:'Bebas Neue',cursive;font-size:2rem;letter-spacing:1px;color:var(--text);margin-bottom:.25rem}
.card-sub{font-size:.8rem;color:var(--muted);margin-bottom:1.75rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.7rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.4rem}
.field input,.field select{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border2);color:var(--text);padding:.72rem 1rem;border-radius:9px;font-family:'Poppins',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s,-webkit-appearance .2s}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field input::placeholder{color:rgba(255,255,255,.25)}
.field select option{background:#0f0d14;color:var(--text)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.btn{width:100%;background:var(--gold);color:#06040A;border:none;border-radius:10px;padding:.85rem;font-family:'Poppins',sans-serif;font-weight:900;font-size:.95rem;cursor:pointer;margin-top:.5rem;transition:opacity .2s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.45;cursor:not-allowed}
.err{background:rgba(212,0,42,.1);border:1px solid rgba(212,0,42,.3);color:#ff6b6b;font-size:.78rem;padding:.6rem .9rem;border-radius:8px;margin-top:.75rem;display:none}
.divider{text-align:center;font-size:.72rem;color:var(--muted);margin:.75rem 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border2)}
.divider::before{left:0}.divider::after{right:0}
.signin-link{text-align:center;font-size:.78rem;color:var(--muted);margin-top:1.25rem}
.signin-link a{color:var(--gold);font-weight:600;text-decoration:none}
.signin-link a:hover{text-decoration:underline}
.ref-badge{background:rgba(0,200,83,.08);border:1px solid rgba(0,200,83,.2);border-radius:8px;padding:.6rem .9rem;font-size:.75rem;color:rgba(0,200,83,.9);margin-bottom:1rem;display:none}
.ref-badge strong{color:var(--green)}
.terms{font-size:.68rem;color:var(--muted);text-align:center;margin-top:1rem;line-height:1.6}
.terms a{color:var(--gold);text-decoration:none}
</style>
</head>
<body>
<div id="stars"></div>
<div class="wrap">
  <div class="logo-bar"><img src="/logo_navbar_400px.png" alt="Dine With Celebrity" onerror="this.src='/logo.png'"/></div>
  <div class="card">
    <div class="card-title">Join Free</div>
    <p class="card-sub">Start earning points toward your celebrity dinner today.</p>
    <div class="ref-badge" id="refBadge">🤝 You were referred by <strong id="refByName">a member</strong>! +300 bonus points on signup.</div>
    <div class="field"><label>Email <span style="color:var(--red)">*</span></label><input type="email" id="inp-email" placeholder="your@email.com" autocomplete="email"/></div>
    <div class="field"><label>Password</label><input type="password" id="inp-pass" placeholder="Min 8 characters" autocomplete="new-password"/></div>
    <div class="field-row">
      <div class="field"><label>First Name</label><input type="text" id="inp-first" placeholder="First name" autocomplete="given-name"/></div>
      <div class="field"><label>Last Name</label><input type="text" id="inp-last" placeholder="Last name" autocomplete="family-name"/></div>
    </div>
    <div class="field"><label>Phone <span style="color:var(--red)">*</span></label><input type="tel" id="inp-phone" placeholder="+91 98765 43210" autocomplete="tel" required/></div>
    <div class="field"><label>State</label>
      <select id="inp-state" onchange="loadCities()">
        <option value="">Select state...</option>
      </select>
    </div>
    <div class="field"><label>City</label>
      <select id="inp-city" disabled>
        <option value="">Select city...</option>
      </select>
    </div>
    <button class="btn" id="btnSignup" onclick="doSignup()">Create Free Account</button>
    <div class="err" id="errMsg"></div>
    <div class="terms">By signing up you agree to our <a href="/privacy">Privacy Policy</a> and <a href="/disclaimer">Terms</a></div>
    <div class="signin-link">Already a member? <a href="/signin">Sign in</a></div>
  </div>
</div>

<script>
// ── SAVE REFERRAL CODE FROM URL ────────────────────────────────
(function(){
  const _ref = new URLSearchParams(window.location.search).get('ref');
  if (_ref) {
    sessionStorage.setItem('dwc_ref', _ref);
    // Show referral badge
    const badge = document.getElementById('refBadge');
    if(badge) badge.style.display='block';
  }
})();

const SB_URL  = 'https://blwqqqzhnovsveeryjlm.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsd3FxcXpobm92c3ZlZXJ5amxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzQ4OTksImV4cCI6MjA4OTQxMDg5OX0.jqQb0IEByZLxHIFAAflMdh_rWYjllVzsexfNRRM7yeY';
const sbClient = supabase.createClient(SB_URL, SB_ANON);

// ── STARS ──────────────────────────────────────────────────────
(function(){
  const s=document.getElementById('stars');
  for(let i=0;i<50;i++){const el=document.createElement('i');el.textContent='★';el.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;font-size:'+(5+Math.random()*8)+'px;animation-delay:'+Math.random()*4+'s;animation-duration:'+(2+Math.random()*3)+'s';s.appendChild(el);}
})();

// ── UTM PASSTHROUGH ────────────────────────────────────────────
const _utmParams = new URLSearchParams(window.location.search);

// ── LOAD STATES + CITIES ───────────────────────────────────────
async function loadStates() {
  const { data } = await sbClient.from('cities').select('state').eq('is_active', true);
  if(!data) return;
  const states = [...new Set(data.map(r=>r.state))].sort();
  const sel = document.getElementById('inp-state');
  states.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
}

async function loadCities() {
  const state = document.getElementById('inp-state').value;
  const citySel = document.getElementById('inp-city');
  citySel.innerHTML = '<option value="">Select city...</option>';
  if(!state) { citySel.disabled=true; return; }
  const { data } = await sbClient.from('cities').select('city').eq('state', state).eq('is_active', true).order('city');
  if(!data) return;
  data.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.city; opt.textContent = r.city;
    citySel.appendChild(opt);
  });
  citySel.disabled = false;
}

// ── SIGNUP ─────────────────────────────────────────────────────
async function doSignup() {
  const email  = document.getElementById('inp-email').value.trim();
  const pass   = document.getElementById('inp-pass').value;
  const first  = document.getElementById('inp-first').value.trim();
  const last   = document.getElementById('inp-last').value.trim();
  const phone  = document.getElementById('inp-phone').value.trim();
  const state  = document.getElementById('inp-state').value;
  const city   = document.getElementById('inp-city').value;
  const err    = document.getElementById('errMsg');
  const btn    = document.getElementById('btnSignup');

  err.style.display='none';
  if(!email||!pass||!first||!last||!city||!phone){err.textContent='Please fill in all required fields including phone number.';err.style.display='block';return;}
  const phoneClean = phone.replace(/[\s\-\(\)\+]/g,'');
  if(phoneClean.length < 10){err.textContent='Please enter a valid phone number (min 10 digits).';err.style.display='block';return;}
  if(pass.length<8){err.textContent='Password must be at least 8 characters.';err.style.display='block';return;}

  btn.disabled=true; btn.textContent='Creating account...';

  try {
    const { data: signupData, error: signupError } = await sbClient.auth.signUp({
      email, password: pass,
      options: { data: { first_name: first, last_name: last }}
    });
    if(signupError) throw signupError;

    const uid = signupData.user?.id;
    if(!uid) throw new Error('Signup failed — no user ID returned.');

    // Build redirect URL preserving UTM + ref
    const utmStr = ['utm_source','utm_medium','utm_campaign','utm_content'].filter(k=>_utmParams.get(k)).map(k=>k+'='+_utmParams.get(k)).join('&');
    const ref = sessionStorage.getItem('dwc_ref') || _utmParams.get('ref') || '';
    let redirect = '/onboarding';
    const qs = [];
    if(ref) qs.push('ref='+encodeURIComponent(ref));
    if(utmStr) qs.push(utmStr);
    if(qs.length) redirect += '?'+qs.join('&');

    window.location.href = redirect;

  } catch(e) {
    err.textContent = e.message || 'Signup failed. Try again.';
    err.style.display = 'block';
    btn.disabled=false; btn.textContent='Create Free Account';
  }
}

// Enter key support
['inp-email','inp-pass','inp-first','inp-last','inp-phone'].forEach(id=>{
  const el=document.getElementById(id);
  if(el) el.addEventListener('keydown',e=>{if(e.key==='Enter')doSignup();});
});

// ── CHECK IF ALREADY SIGNED IN ─────────────────────────────────
(async function(){
  const { data: { session }} = await sbClient.auth.getSession();
  if(session) window.location.href = '/dashboard';
  else loadStates();
})();
</script>
</body>
</html>
