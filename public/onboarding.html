<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Complete Your Profile — Dine With Celebrity</title>
<meta name="description" content="Complete your DWC profile and start earning points toward your celebrity dinner."/>
<meta property="og:title" content="Complete Your Profile — Dine With Celebrity"/>
<meta property="og:description" content="One step away from earning your first celebrity dinner points."/>
<meta property="og:image" content="https://www.dinewithcelebrity.com/logo.png"/>
<meta property="og:url" content="https://www.dinewithcelebrity.com/onboarding"/>
<meta property="og:type" content="website"/>
<meta name="twitter:card" content="summary_large_image"/>
<link rel="canonical" href="https://www.dinewithcelebrity.com/onboarding"/>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebPage","name":"DWC Onboarding","url":"https://www.dinewithcelebrity.com/onboarding","publisher":{"@type":"Organization","name":"Dine With Celebrity Pvt Ltd"}}</script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#06040A;--gold:#F2B705;--gold2:#FFD166;--red:#D4002A;--green:#00C853;--text:rgba(255,255,255,.95);--sub:rgba(255,255,255,.72);--muted:rgba(255,255,255,.45);--border:rgba(242,183,5,.2);--border2:rgba(255,255,255,.08);--card:#0f0d14;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
#stars i{position:absolute;color:#F2B705;font-style:normal;animation:tw 3s ease-in-out infinite alternate}
@keyframes tw{0%{opacity:.04}100%{opacity:.2}}
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
.logo-bar{margin-bottom:1.5rem;text-align:center}
.logo-bar img{height:44px;width:auto}
/* Steps */
.steps-bar{display:flex;align-items:center;gap:.4rem;margin-bottom:2rem}
.step{width:28px;height:4px;border-radius:100px;background:var(--border2);transition:background .3s}
.step.done{background:var(--green)}
.step.active{background:var(--gold)}
/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:460px}
.card-title{font-family:'Bebas Neue',cursive;font-size:2rem;letter-spacing:1px;color:var(--text);margin-bottom:.2rem}
.card-sub{font-size:.8rem;color:var(--muted);margin-bottom:1.75rem;line-height:1.6}
/* Fields */
.field{margin-bottom:1rem}
.field label{display:block;font-size:.7rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.4rem}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border2);color:var(--text);padding:.72rem 1rem;border-radius:9px;font-family:'Poppins',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
.field input::placeholder,.field textarea::placeholder{color:rgba(255,255,255,.25)}
.field select option{background:#0f0d14;color:var(--text)}
.field textarea{resize:vertical;min-height:80px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
/* Interests */
.interests-grid{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.4rem}
.int-btn{background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--sub);font-family:'Poppins',sans-serif;font-size:.75rem;padding:.4rem .85rem;border-radius:100px;cursor:pointer;transition:all .2s}
.int-btn.sel{background:rgba(242,183,5,.12);border-color:var(--gold);color:var(--gold)}
/* Points preview */
.pts-preview{background:rgba(242,183,5,.06);border:1px solid rgba(242,183,5,.15);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.pts-preview-title{font-size:.72rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem}
.pts-row{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:.25rem}
.pts-row:last-child{margin-bottom:0;padding-top:.4rem;border-top:1px solid rgba(242,183,5,.1)}
.pts-label{color:var(--muted)}
.pts-val{font-family:'Bebas Neue',cursive;font-size:1rem;color:var(--gold)}
.pts-val.total{font-size:1.25rem;color:var(--gold2)}
/* Buttons */
.btn{width:100%;background:var(--gold);color:#06040A;border:none;border-radius:10px;padding:.85rem;font-family:'Poppins',sans-serif;font-weight:900;font-size:.95rem;cursor:pointer;transition:opacity .2s;margin-top:.5rem}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-back{width:100%;background:transparent;color:var(--muted);border:1px solid var(--border2);border-radius:10px;padding:.75rem;font-family:'Poppins',sans-serif;font-size:.85rem;cursor:pointer;margin-top:.5rem;transition:all .2s}
.btn-back:hover{border-color:var(--gold);color:var(--gold)}
.err{background:rgba(212,0,42,.1);border:1px solid rgba(212,0,42,.3);color:#ff6b6b;font-size:.78rem;padding:.6rem .9rem;border-radius:8px;margin-top:.75rem;display:none}
/* Welcome screen */
.welcome-icon{font-size:3.5rem;text-align:center;margin-bottom:1rem}
.welcome-title{font-family:'Bebas Neue',cursive;font-size:2.5rem;text-align:center;color:var(--gold);letter-spacing:1px;margin-bottom:.5rem}
.welcome-sub{font-size:.85rem;color:var(--sub);text-align:center;line-height:1.75;margin-bottom:1.5rem}
.confetti{font-size:1.5rem;text-align:center;margin-bottom:.5rem;animation:bounce .6s ease-in-out infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
</style>
</head>
<body>
<div id="stars"></div>
<div class="wrap">
  <div class="logo-bar"><img src="/logo_navbar_400px.png" alt="Dine With Celebrity" onerror="this.src='/logo.png'"/></div>
  <div class="steps-bar" id="stepsBar">
    <div class="step active" id="step1"></div>
    <div class="step" id="step2"></div>
    <div class="step" id="step3"></div>
  </div>
  <div class="card" id="cardContent">
    <div style="text-align:center;padding:2rem 0"><div style="font-size:2rem">⏳</div><div style="color:var(--muted);margin-top:.5rem;font-size:.85rem">Loading your profile...</div></div>
  </div>
</div>

<script>
const SB_URL  = 'https://blwqqqzhnovsveeryjlm.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsd3FxcXpobm92c3ZlZXJ5amxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzQ4OTksImV4cCI6MjA4OTQxMDg5OX0.jqQb0IEByZLxHIFAAflMdh_rWYjllVzsexfNRRM7yeY';
const sbClient = supabase.createClient(SB_URL, SB_ANON);

let currentUser = null;
let currentStep = 1;
const urlParams = new URLSearchParams(window.location.search);

// ── STARS ──────────────────────────────────────────────────────
(function(){
  const s=document.getElementById('stars');
  for(let i=0;i<50;i++){const el=document.createElement('i');el.textContent='★';el.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;font-size:'+(5+Math.random()*8)+'px;animation-delay:'+Math.random()*4+'s;animation-duration:'+(2+Math.random()*3)+'s';s.appendChild(el);}
})();

// ── UPDATE STEP BAR ────────────────────────────────────────────
function setStep(n) {
  currentStep = n;
  [1,2,3].forEach(i => {
    const el = document.getElementById('step'+i);
    if(!el) return;
    el.className = 'step' + (i<n?' done':i===n?' active':'');
  });
}

// ── RENDER STEP 1 — INTERESTS + BIO ───────────────────────────
function renderStep1() {
  setStep(1);
  const interests = ['Bollywood','Tollywood','Kollywood','Cricket','Punjabi Music','Mollywood','Sports','Web Series','Reality TV'];
  document.getElementById('cardContent').innerHTML = `
    <div class="card-title">Your Interests</div>
    <p class="card-sub">Tell us what you love so we can match you with the right celebrities.</p>
    <div class="field">
      <label>Favourite Celebrities & Genres</label>
      <div class="interests-grid" id="interestsGrid">
        ${interests.map(i=>`<button class="int-btn" onclick="toggleInterest(this,'${i}')">${i}</button>`).join('')}
      </div>
    </div>
    <div class="field">
      <label>About You (optional)</label>
      <textarea id="inp-bio" placeholder="Tell us about yourself — favourite movies, celebrity encounters, bucket list..."></textarea>
    </div>
    <button class="btn" onclick="goStep2()">Continue →</button>
    <div class="err" id="errMsg"></div>`;
}

const selectedInterests = [];
function toggleInterest(btn, val) {
  const idx = selectedInterests.indexOf(val);
  if(idx > -1) { selectedInterests.splice(idx,1); btn.classList.remove('sel'); }
  else { selectedInterests.push(val); btn.classList.add('sel'); }
}

function goStep2() { renderStep2(); }

// ── RENDER STEP 2 — PREFERENCES ────────────────────────────────
function renderStep2() {
  setStep(2);
  document.getElementById('cardContent').innerHTML = `
    <div class="card-title">Your Preferences</div>
    <p class="card-sub">Help us personalise your DWC experience.</p>
    <div class="field">
      <label>How did you hear about us?</label>
      <select id="inp-source">
        <option value="">Select...</option>
        <option value="instagram">Instagram</option>
        <option value="facebook">Facebook</option>
        <option value="youtube">YouTube</option>
        <option value="friend">Friend / Family</option>
        <option value="google">Google Search</option>
        <option value="whatsapp">WhatsApp</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="field">
      <label>What would you most love to do?</label>
      <select id="inp-goal">
        <option value="">Select...</option>
        <option value="dinner">Dine with a Bollywood star</option>
        <option value="cricket">Meet a cricket legend</option>
        <option value="tollywood">Dinner with a Telugu star</option>
        <option value="music">Meet a music artist</option>
        <option value="sports">Meet a sports icon</option>
      </select>
    </div>
    <div class="field">
      <label>Birthday (optional — we'll surprise you)</label>
      <input type="date" id="inp-dob"/>
    </div>
    <button class="btn" onclick="goStep3()">Continue →</button>
    <button class="btn-back" onclick="renderStep1()">← Back</button>
    <div class="err" id="errMsg"></div>`;
}

function goStep3() { renderStep3(); }

// ── RENDER STEP 3 — POINTS PREVIEW + FINISH ────────────────────
function renderStep3() {
  setStep(3);
  const refCode = urlParams.get('ref') || sessionStorage.getItem('dwc_ref') || '';
  const signupPts = 300;
  const refPts    = refCode ? 300 : 0;
  const totalPts  = signupPts + refPts;

  document.getElementById('cardContent').innerHTML = `
    <div class="card-title">You're Almost In!</div>
    <p class="card-sub">Here's what you're getting right now — for free.</p>
    <div class="pts-preview">
      <div class="pts-preview-title">⭐ Your Welcome Points</div>
      <div class="pts-row"><span class="pts-label">Signup bonus</span><span class="pts-val">+300 pts</span></div>
      ${refCode?`<div class="pts-row"><span class="pts-label">Referral bonus</span><span class="pts-val" style="color:var(--green)">+300 pts</span></div>`:''}
      <div class="pts-row"><span class="pts-label">Total starting balance</span><span class="pts-val total">${totalPts} pts</span></div>
    </div>
    <div class="pts-preview" style="margin-top:-.25rem">
      <div class="pts-preview-title">🎁 What Points Get You</div>
      <div class="pts-row"><span class="pts-label">Restaurant discount</span><span class="pts-val">Up to ₹500 off</span></div>
      <div class="pts-row"><span class="pts-label">Celebrity dinner discount</span><span class="pts-val">Up to ₹10,000 off</span></div>
    </div>
    <button class="btn" id="btnFinish" onclick="saveAndFinish()">🚀 Enter DWC — Claim My Points</button>
    <button class="btn-back" onclick="renderStep2()">← Back</button>
    <div class="err" id="errMsg"></div>`;
}

// ── SAVE AND FINISH ────────────────────────────────────────────
async function saveAndFinish() {
  const btn = document.getElementById('btnFinish');
  const err = document.getElementById('errMsg');
  if(btn) { btn.disabled=true; btn.textContent='Saving...'; }
  if(err) err.style.display='none';

  try {
    // ── REFERRAL HANDLING ──────────────────────────────────────
    const _refCode    = urlParams.get('ref') || sessionStorage.getItem('dwc_ref') || '';
    let   _referrerId = null;
    if (_refCode) {
      const { data: _referrer } = await sbClient
        .from('members')
        .select('id')
        .eq('referral_code', _refCode)
        .maybeSingle();
      if (_referrer && _referrer.id !== currentUser.id) {
        _referrerId = _referrer.id;
      }
    }

    // ── BUILD UPDATE PAYLOAD ───────────────────────────────────
    const source = document.getElementById('inp-source')?.value || '';
    const goal   = document.getElementById('inp-goal')?.value   || '';
    const dob    = document.getElementById('inp-dob')?.value    || null;
    const bio    = document.getElementById('inp-bio')?.value    || '';

    var u = {
      onboarded:   true,
      interests:   selectedInterests,
      bio:         bio,
      how_heard:   source,
      dream_goal:  goal,
      date_of_birth: dob || null,
      referred_by: _referrerId,
    };

    const { error: upErr } = await sbClient
      .from('members')
      .update(u)
      .eq('id', currentUser.id);

    if (upErr) throw upErr;

    // ── AWARD SIGNUP POINTS ─────────────────────────────────────
    await sbClient.rpc('award_points', {
      p_member_id:    currentUser.id,
      p_reason:       'signup',
      p_points:       300,
      p_idempotency:  'signup_' + currentUser.id,
      p_note:         'Welcome bonus'
    });

    // ── AWARD REFERRAL POINTS ───────────────────────────────────
    if (_referrerId) {
      try {
        await sbClient.rpc('award_points', {
          p_member_id:   currentUser.id,
          p_reason:      'referral_received',
          p_points:      300,
          p_idempotency: 'ref_rcv_' + currentUser.id,
          p_note:        'Joined via referral code ' + _refCode
        });
        await sbClient.rpc('award_points', {
          p_member_id:   _referrerId,
          p_reason:      'referral_sent',
          p_points:      500,
          p_idempotency: 'ref_snt_' + _referrerId + '_' + currentUser.id,
          p_note:        'Referred a new member'
        });
        sessionStorage.removeItem('dwc_ref');
      } catch(refErr) {
        console.warn('[referral points]', refErr);
      }
    }

    // ── SHOW WELCOME SCREEN ─────────────────────────────────────
    document.getElementById('stepsBar').style.display='none';
    document.getElementById('cardContent').innerHTML = `
      <div class="confetti">🎉</div>
      <div class="welcome-icon">⭐</div>
      <div class="welcome-title">Welcome to DWC!</div>
      <p class="welcome-sub">You now have <strong style="color:var(--gold)">${_referrerId?600:300} points</strong> in your account.<br>
        Start dining and shopping at partner brands to earn more — every experience brings you closer to your celebrity dinner.</p>
      <button class="btn" onclick="window.location.href='/dashboard'">Go to My Dashboard →</button>`;

  } catch(e) {
    const err2 = document.getElementById('errMsg');
    if(err2){ err2.textContent = e.message||'Something went wrong.'; err2.style.display='block'; }
    if(btn){ btn.disabled=false; btn.textContent='🚀 Enter DWC — Claim My Points'; }
  }
}

// ── INIT ───────────────────────────────────────────────────────
(async function(){
  const { data: { session } } = await sbClient.auth.getSession();
  if(!session) { window.location.href='/signin?redirect=onboarding'; return; }
  currentUser = session.user;

  // Check if already onboarded
  const { data: member } = await sbClient
    .from('members')
    .select('onboarded, first_name')
    .eq('id', currentUser.id)
    .maybeSingle();

  if(member?.onboarded) {
    window.location.href = '/dashboard';
    return;
  }

  renderStep1();
})();
</script>
</body>
</html>
