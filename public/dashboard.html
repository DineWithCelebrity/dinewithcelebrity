<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Dashboard — Dine With Celebrity</title>
<meta name="robots" content="noindex">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#06040A;--card:#110916;--card2:#1a0f1e;--gold:#F2B705;--gold2:#FFD166;--red:#D4002A;--green:#00C853;--purple:#9b59b6;--purp2:#c39bd3;--text:rgba(255,255,255,.95);--sub:rgba(255,255,255,.75);--muted:rgba(255,255,255,.55);--border:rgba(242,183,5,.18);--border2:rgba(255,255,255,.08)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh;overflow-x:hidden;font-size:1rem}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
#stars i{position:absolute;color:#F2B705;font-style:normal;animation:tw 3.2s ease-in-out infinite alternate}
@keyframes tw{0%{opacity:.05;transform:scale(.85)}100%{opacity:.4;transform:scale(1.1)}}
.brand-bg{position:fixed;bottom:-60px;right:-60px;font-family:'Bebas Neue',cursive;font-size:22rem;color:rgba(242,183,5,.022);pointer-events:none;z-index:0;line-height:1;user-select:none}
/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(6,4,10,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 28px}
.nav-logo{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:var(--gold);letter-spacing:.08em;text-decoration:none}
.nav-logo span{color:var(--text)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-tier{font-size:.78rem;font-weight:700;padding:5px 14px;border-radius:100px;border:1px solid}
.nav-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;color:#06040A;cursor:pointer}
/* LAYOUT */
.page{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0}
/* Two panel for free */
.two-panel{display:grid;grid-template-columns:1fr 380px;min-height:calc(100vh - 60px)}
.panel-left{padding:32px 36px;overflow-y:auto}
.panel-right{background:linear-gradient(180deg,#0d0005,#06040A);border-left:1px solid var(--border2);padding:32px 24px;display:flex;flex-direction:column;gap:20px;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
/* Single panel for paid */
.single-panel{padding:32px 36px}
/* Common */
.welcome-greeting{font-size:.8rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.welcome-name{font-family:'Bebas Neue',cursive;font-size:3rem;line-height:1;margin-bottom:4px}
.welcome-name em{font-style:normal}
.welcome-sub{font-size:.9rem;color:var(--sub);margin-bottom:28px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:16px;text-align:center}
.stat-num{font-family:'Bebas Neue',cursive;font-size:2rem;line-height:1;margin-bottom:2px}
.stat-lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.sec-label{font-size:.72rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border2)}
/* FREE: price block */
.price-block{background:linear-gradient(135deg,#1a0008,#0f0015);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:24px;position:relative;overflow:hidden}
.price-block::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),var(--gold),transparent)}
.pb-label{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.pb-base{font-family:'Bebas Neue',cursive;font-size:2rem;color:rgba(255,255,255,.2);text-decoration:line-through;text-decoration-color:var(--red);line-height:1;margin-bottom:4px}
.pb-price{font-family:'Bebas Neue',cursive;font-size:4.5rem;color:var(--gold);line-height:1;margin-bottom:8px}
.pb-sub{font-size:.88rem;color:var(--sub);margin-bottom:16px;line-height:1.5}
.prog-track{background:rgba(255,255,255,.07);border-radius:100px;height:8px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--gold),var(--gold2));width:0%;transition:width 1.5s ease}
.prog-label{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:6px}
/* Ways */
.ways{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.way{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:14px 16px}
.way-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.wi-g{background:rgba(242,183,5,.12)}.wi-gr{background:rgba(0,200,83,.1)}.wi-b{background:rgba(100,150,255,.1)}
.way-info{flex:1}.way-title{font-size:.92rem;font-weight:700;color:var(--text);margin-bottom:2px}
.way-desc{font-size:.8rem;color:var(--muted);line-height:1.4}
.way-reward{font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--green);white-space:nowrap}
/* Referral */
.ref-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:24px}
.ref-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.ref-title{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:var(--text)}
.ref-earned{font-size:.82rem;color:var(--green);font-weight:600}
.ref-code-row{display:flex;gap:8px;margin-bottom:14px}
.ref-code{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-family:'Bebas Neue',cursive;font-size:1.2rem;color:var(--gold);letter-spacing:.1em}
.btn-copy{background:rgba(242,183,5,.1);border:1px solid var(--border);color:var(--gold);font-size:.8rem;font-weight:700;padding:12px 16px;border-radius:8px;cursor:pointer;font-family:'Poppins',sans-serif;white-space:nowrap}
.ref-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ref-stat{background:var(--card2);border-radius:10px;padding:12px;text-align:center}
.rs-num{font-family:'Bebas Neue',cursive;font-size:1.6rem;color:var(--gold2);display:block}
.rs-lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
/* FREE right panel */
.up-label{font-size:.72rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--red);display:flex;align-items:center;gap:8px}
.up-label::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.up-heading{font-family:'Bebas Neue',cursive;font-size:2rem;line-height:1.05;color:var(--text)}
.up-heading em{color:var(--gold);font-style:normal}
.up-sub{font-size:.88rem;color:var(--sub);line-height:1.6}
.missing{display:flex;flex-direction:column;gap:8px}
.miss-item{display:flex;align-items:flex-start;gap:12px;padding:12px;background:rgba(212,0,42,.05);border:1px solid rgba(212,0,42,.15);border-radius:10px}
.miss-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
.miss-title{font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:2px}
.miss-desc{font-size:.78rem;color:var(--muted);line-height:1.4}
.cta-block{background:linear-gradient(135deg,rgba(242,183,5,.08),rgba(212,0,42,.05));border:1px solid var(--border);border-radius:16px;padding:20px}
.cta-title{font-family:'Bebas Neue',cursive;font-size:1.4rem;color:var(--text);margin-bottom:4px}
.cta-sub{font-size:.82rem;color:var(--sub);margin-bottom:16px;line-height:1.5}
.btn-upgrade{display:block;background:var(--gold);color:#06040A;font-family:'Poppins',sans-serif;font-size:.95rem;font-weight:800;text-align:center;padding:15px;border-radius:10px;text-decoration:none;text-transform:uppercase;letter-spacing:.06em;border:none;cursor:pointer;width:100%;transition:opacity .2s;margin-bottom:10px}
.cta-note{font-size:.75rem;color:var(--muted);text-align:center;line-height:1.5}
/* PAID features grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
.feature-card{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:20px;transition:border-color .3s}
.feature-card:hover{border-color:var(--border)}
.fc-icon{font-size:1.8rem;margin-bottom:10px}
.fc-title{font-family:'Bebas Neue',cursive;font-size:1.2rem;color:var(--text);margin-bottom:4px}
.fc-desc{font-size:.85rem;color:var(--sub);line-height:1.5}
.fc-val{font-family:'Bebas Neue',cursive;font-size:1.4rem;color:var(--green);margin-top:8px}
/* Nudge */
.nudge{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:16px;margin-bottom:20px}
.nudge-text{flex:1}.nudge-title{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:3px}
.nudge-desc{font-size:.82rem;color:var(--muted)}
.btn-nudge{font-size:.8rem;font-weight:700;padding:10px 16px;border-radius:8px;cursor:pointer;font-family:'Poppins',sans-serif;white-space:nowrap;text-decoration:none;border:1px solid}
/* Purple VIP */
.vip-card{background:linear-gradient(135deg,rgba(155,89,182,.12),rgba(155,89,182,.03));border:1px solid rgba(155,89,182,.3);border-radius:20px;padding:24px;margin-bottom:28px;position:relative;overflow:hidden}
.vip-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--purple),var(--purp2),transparent)}
.vip-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.vip-stat{background:rgba(155,89,182,.08);border:1px solid rgba(155,89,182,.15);border-radius:12px;padding:14px;text-align:center}
.vs-num{font-family:'Bebas Neue',cursive;font-size:1.8rem;color:var(--purp2);display:block;line-height:1}
.vs-lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
/* Loading */
#loadingState{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loader{width:44px;height:44px;border:3px solid rgba(242,183,5,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.two-panel{grid-template-columns:1fr}.panel-right{position:relative;height:auto;top:0;border-left:none;border-top:1px solid var(--border2)}.stats-row{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}
</style>
</head>

function renderPlatinum(m,user,refs,rs){

  var rc=m.referral_code||refCode(fn);
  var yp=70000-((m.dining_visits||0)*500)-rs-10000;

(async function(){
  var sess=await sbClient.auth.getSession();
  if(!sess.data.session){window.location.href='/signin';return;}
  var user=sess.data.session.user;
  var res=await sbClient.from('members').select('*').eq('email',user.email).single();
  var m=res.data||{};
  var tier=(m.tier||'free').toLowerCase();

  // Referrals
  var rc=m.referral_code||refCode((m.full_name||user.email).split(' ')[0]);
  var rr=await sbClient.from('members').select('*',{count:'exact',head:true}).eq('referred_by',rc);
  var refs=rr.count||0,rs=refs*2000;

  // Nav
  var tierLabels={free:'Free Member',gold:'&#9733; DWC Gold',platinum:'&#x2B51; DWC Platinum',purple:'&#x1F7E3; DWC Purple VIP'};
  var tierColors={free:'rgba(255,255,255,.06)',gold:'rgba(242,183,5,.12)',platinum:'rgba(200,200,220,.1)',purple:'rgba(155,89,182,.15)'};
  var tierBorders={free:'rgba(255,255,255,.08)',gold:'rgba(242,183,5,.3)',platinum:'rgba(200,200,220,.2)',purple:'rgba(155,89,182,.3)'};
  var tierTextColors={free:'rgba(255,255,255,.55)',gold:'#F2B705',platinum:'#E8E8E8',purple:'#c39bd3'};
  var tierAvBg={free:'linear-gradient(135deg,#F2B705,#8a6000)',gold:'linear-gradient(135deg,#F2B705,#8a6000)',platinum:'linear-gradient(135deg,#c0c0c0,#606070)',purple:'linear-gradient(135deg,#9b59b6,#6c3483)'};
  var tierAvColor={free:'#06040A',gold:'#06040A',platinum:'#06040A',purple:'#fff'};
  var tierAvBorder={free:'#F2B705',gold:'#F2B705',platinum:'#E8E8E8',purple:'#9b59b6'};

  var nt=document.getElementById('navTier');
  nt.innerHTML=tierLabels[tier]||'Free Member';
  nt.style.background=tierColors[tier];
  nt.style.borderColor=tierBorders[tier];
  nt.style.color=tierTextColors[tier];

  var fn=(m.full_name||user.email).split(' ')[0];
  var av=document.getElementById('navAv');
  av.textContent=fn.charAt(0).toUpperCase();
  av.style.background=tierAvBg[tier];
  av.style.color=tierAvColor[tier];
  av.style.border='2px solid '+tierAvBorder[tier];

  // Render content
  var renders={free:renderFree,gold:renderGold,platinum:renderPlatinum,purple:renderPurple};
  var renderFn=renders[tier]||renderFree;
  document.getElementById('dashPage').innerHTML=renderFn(m,user,refs,rs);

  // Wire copy button
  document.getElementById('btnCopy').onclick=function(){
    navigator.clipboard.writeText(rc);
    this.textContent='Copied!';
    var s=this;setTimeout(function(){s.textContent='Copy';},2000);
  };

  // Show
  document.getElementById('loadingState').style.display='none';
  document.getElementById('dashPage').style.display='block';
  document.querySelector('nav').style.display='flex';

  // Sign out
  av.addEventListener('click',async function(){
    if(confirm('Sign out?')){await sbClient.auth.signOut();window.location.href='/';}
  });
})();
</script>
